name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  import-smoke:
    name: Import smoke check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Verify all __init__.py files exist
        run: python scripts/check_imports.py --verify-init
      - name: Smoke-test package imports
        run: python scripts/check_imports.py --smoke
      - name: Verify tool registry bootstraps
        run: python scripts/check_imports.py --registry

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -q --tb=short
      - name: Extraction benchmark gate (informational in first v6 wave)
        continue-on-error: true
        run: python -m openharness.impact.extraction_eval --gate 0.75

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install dependencies
        working-directory: frontend/terminal
        run: npm ci
      - name: TypeScript check
        working-directory: frontend/terminal
        run: npx tsc --noEmit
