# Core Metric Set per SDG
#
# A curated short list of IRIS+ 5.3c metric IDs that best evidence each SDG.
# Used by sdg_mapper.py so that SDG coverage scoring is comparable across
# goals of very different breadth (SDG 8 has 468 IRIS+ metrics; SDG 14 has 26).
#
# Selection criteria:
#   - Listed in IRIS+ Core Metric Set when applicable
#   - Most-reported in GIIN Annual Impact Investor Survey for the goal
#   - Direct outcome / output metrics (not activity / structural)
#   - 8 to 15 metrics per goal — enough for material coverage,
#     small enough that 30-50% coverage is achievable for an active reporter
#
# Maintenance: update when GIIN Compass / IRIS+ Core Metric Sets change.

version: "1.0"
source: "GIIN IRIS+ 5.3c, GIIN Annual Impact Investor Survey 2024 (curated)"
last_updated: "2026-04-21"

