# Risk assessment rules
# Keywords that trigger specific risk categories in impact_risk_opportunity tool.
risk_rules:
  over-indebted:
    category: social_harm
    risk: Potential over-indebtedness of vulnerable clients
    severity: high
    likelihood: medium
    mitigation: Set affordability limits and monitor repayment stress signals.
  privacy:
    category: data_governance
    risk: Data privacy and consent risk
    severity: high
    likelihood: medium
    mitigation: Adopt privacy-by-design and third-party security audits.
  climate:
    category: environmental
    risk: Climate transition and physical risk exposure
    severity: medium
    likelihood: high
    mitigation: Define adaptation plans and emissions reduction targets.
  waste:
    category: environmental
    risk: Waste and pollution externalities
    severity: medium
    likelihood: medium
    mitigation: Track waste streams and implement circular mitigation plans.
  labor:
    category: social
    risk: Labor standards and worker welfare risk
    severity: medium
    likelihood: medium
    mitigation: Implement supplier and workforce labor compliance controls.
  grant:
    category: business_model
    risk: Grant dependence threatens long-term impact sustainability
    severity: medium
    likelihood: medium
    mitigation: Diversify revenue and test unit economics of impact model.
  concentration:
    category: concentration
    risk: Revenue or beneficiary concentration in single geography or client
    severity: medium
    likelihood: medium
    mitigation: Diversify across geographies and client segments.
  regulatory:
    category: regulatory_policy
    risk: Regulatory or policy change may undermine the business model
    severity: high
    likelihood: low
    mitigation: Monitor regulatory landscape and build adaptability into the business model.
  reputation:
    category: reputational
    risk: Reputational risk from impact-washing or unintended harm
    severity: high
    likelihood: low
    mitigation: Implement transparent reporting and independent verification.
  exit:
    category: exit
    risk: Exit strategy may erode impact outcomes for beneficiaries
    severity: medium
    likelihood: medium
    mitigation: Include impact preservation clauses in shareholder agreements.
  data integrity:
    category: data_integrity
    risk: Self-reported data with no third-party verification
    severity: medium
    likelihood: high
    mitigation: Establish data validation processes and plan for third-party audit.

# Opportunity rules
opportunity_rules:
  financial inclusion:
    category: inclusion
    opportunity: Expand access to formal financial services for underserved groups
    time_horizon: near_term
  women:
    category: equity
    opportunity: Increase women-centered outcomes and gender equity positioning
    time_horizon: near_term
  smallholder:
    category: livelihoods
    opportunity: Raise smallholder productivity and rural income resilience
    time_horizon: mid_term
  renewable:
    category: climate
    opportunity: Scale decarbonization impact through renewable adoption
    time_horizon: mid_term
  education:
    category: human_capital
    opportunity: Improve education access and long-term employability outcomes
    time_horizon: long_term
  health:
    category: wellbeing
    opportunity: Improve affordability and reach of essential health services
    time_horizon: mid_term
  circular economy:
    category: environment
    opportunity: Capture value from waste streams and reduce resource dependence
    time_horizon: mid_term
  digital:
    category: technology
    opportunity: Scale impact through digital delivery channels and data-driven insights
    time_horizon: near_term
  affordable housing:
    category: livelihoods
    opportunity: Address housing gap with scalable affordable solutions
    time_horizon: mid_term
  clean water:
    category: environment
    opportunity: Improve access to safe water and sanitation infrastructure
    time_horizon: mid_term
  youth:
    category: human_capital
    opportunity: Create pathways for youth employment and skills development
    time_horizon: mid_term
  biodiversity:
    category: environment
    opportunity: Protect and restore biodiversity through nature-based solutions
    time_horizon: long_term
