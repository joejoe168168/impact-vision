# Risk assessment rules
# Keywords that trigger specific risk categories in impact_risk_opportunity tool.
risk_rules:
  over-indebted:
    category: social_harm
    risk: Potential over-indebtedness of vulnerable clients
    severity: high
    mitigation: Set affordability limits and monitor repayment stress signals.
  privacy:
    category: data_governance
    risk: Data privacy and consent risk
    severity: high
    mitigation: Adopt privacy-by-design and third-party security audits.
  climate:
    category: environmental
    risk: Climate transition and physical risk exposure
    severity: medium
    mitigation: Define adaptation plans and emissions reduction targets.
  waste:
    category: environmental
    risk: Waste and pollution externalities
    severity: medium
    mitigation: Track waste streams and implement circular mitigation plans.
  labor:
    category: social
    risk: Labor standards and worker welfare risk
    severity: medium
    mitigation: Implement supplier and workforce labor compliance controls.
  grant:
    category: business_model
    risk: Grant dependence threatens long-term impact sustainability
    severity: medium
    mitigation: Diversify revenue and test unit economics of impact model.

# Opportunity rules
opportunity_rules:
  financial inclusion:
    category: inclusion
    opportunity: Expand access to formal financial services for underserved groups
    time_horizon: near_term
  women:
    category: equity
    opportunity: Increase women-centered outcomes and gender equity positioning
    time_horizon: near_term
  smallholder:
    category: livelihoods
    opportunity: Raise smallholder productivity and rural income resilience
    time_horizon: mid_term
  renewable:
    category: climate
    opportunity: Scale decarbonization impact through renewable adoption
    time_horizon: mid_term
  education:
    category: human_capital
    opportunity: Improve education access and long-term employability outcomes
    time_horizon: long_term
  health:
    category: wellbeing
    opportunity: Improve affordability and reach of essential health services
    time_horizon: mid_term
